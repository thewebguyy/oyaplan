<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" width="100%" height="100%" preserveAspectRatio="xMidYMax slice">
  <defs>
    <style>
      @keyframes float-cloud-1 {
        0% { transform: translateX(-200px); }
        100% { transform: translateX(1600px); }
      }
      @keyframes float-cloud-2 {
        0% { transform: translateX(1600px); }
        100% { transform: translateX(-300px); }
      }
      @keyframes drive-danfo {
        0% { transform: translateX(-150px); }
        100% { transform: translateX(1600px); }
      }
      @keyframes drive-car {
        0% { transform: translateX(1600px) scaleX(-1); }
        100% { transform: translateX(-150px) scaleX(-1); }
      }
      .cloud1 { animation: float-cloud-1 140s linear infinite; }
      .cloud2 { animation: float-cloud-2 190s linear infinite; }
      .danfo { animation: drive-danfo 18s linear infinite; }
      .car1 { animation: drive-car 14s linear infinite; }
    </style>
  </defs>

  <!-- Sun -->
  <circle cx="1100" cy="180" r="70" fill="#FFECB3" opacity="0.8"/>

  <!-- Clouds Background -->
  <g class="cloud1" fill="#FFFFFF" opacity="0.9">
    <path d="M -100 200 Q -100 170 -60 170 Q -40 130 0 140 Q 40 120 70 160 Q 110 160 100 200 Z" />
    <path d="M 600 250 Q 600 220 640 220 Q 660 180 700 190 Q 740 170 770 210 Q 810 210 800 250 Z" />
  </g>
  <g class="cloud2" fill="#FFFFFF" opacity="0.7">
    <path d="M 300 120 Q 300 100 330 100 Q 350 70 380 80 Q 410 60 430 90 Q 460 90 450 120 Z" />
    <path d="M 1000 160 Q 1000 130 1040 130 Q 1060 90 1100 100 Q 1140 80 1170 120 Q 1210 120 1200 160 Z" />
  </g>

  <!-- Far Background Horizon / Bridge -->
  <path d="M 0 520 L 1440 520 L 1440 600 L 0 600 Z" fill="#E8F5E9" opacity="0.6" />
  
  <!-- Lekki-Ikoyi Bridge -->
  <path d="M 980 520 L 1000 300 L 1020 520 Z" fill="#CFD8DC" />
  <line x1="920" y1="520" x2="1000" y2="320" stroke="#B0BEC5" stroke-width="2" />
  <line x1="940" y1="520" x2="1000" y2="350" stroke="#B0BEC5" stroke-width="2" />
  <line x1="960" y1="520" x2="1000" y2="380" stroke="#B0BEC5" stroke-width="2" />
  <line x1="1080" y1="520" x2="1000" y2="320" stroke="#B0BEC5" stroke-width="2" />
  <line x1="1060" y1="520" x2="1000" y2="350" stroke="#B0BEC5" stroke-width="2" />
  <line x1="1040" y1="520" x2="1000" y2="380" stroke="#B0BEC5" stroke-width="2" />
  
  <path d="M 1200 520 L 1220 340 L 1240 520 Z" fill="#CFD8DC" />
  <line x1="1160" y1="520" x2="1220" y2="360" stroke="#B0BEC5" stroke-width="2" />
  <line x1="1180" y1="520" x2="1220" y2="390" stroke="#B0BEC5" stroke-width="2" />
  <line x1="1280" y1="520" x2="1220" y2="360" stroke="#B0BEC5" stroke-width="2" />
  <line x1="1260" y1="520" x2="1220" y2="390" stroke="#B0BEC5" stroke-width="2" />

  <!-- Midground City (Civic Centre) Left Side -->
  <rect x="140" y="310" width="140" height="10" fill="#0288D1" />
  <polygon points="205,310 215,310 212,200 208,200" fill="#0288D1" />
  <g transform="translate(0, 0)">
    <rect x="150" y="320" width="120" height="230" fill="#4FC3F7" />
    <line x1="150" y1="320" x2="270" y2="435" stroke="#0288D1" stroke-width="4" />
    <line x1="270" y1="320" x2="150" y2="435" stroke="#0288D1" stroke-width="4" />
    <line x1="150" y1="435" x2="270" y2="550" stroke="#0288D1" stroke-width="4" />
    <line x1="270" y1="435" x2="150" y2="550" stroke="#0288D1" stroke-width="4" />
    <rect x="150" y="320" width="120" height="230" fill="none" stroke="#0288D1" stroke-width="4" />
  </g>

  <!-- Some background generic yellow building -->
  <rect x="310" y="400" width="100" height="150" fill="#FFCA28" />
  <rect x="300" y="390" width="120" height="10" fill="#FF8F00" />
  <rect x="330" y="420" width="20" height="20" fill="#FFE082" />
  <rect x="370" y="420" width="20" height="20" fill="#FFE082" />
  <rect x="330" y="460" width="20" height="20" fill="#FFE082" />
  <rect x="370" y="460" width="20" height="20" fill="#FFE082" />
  <rect x="330" y="500" width="20" height="20" fill="#FFE082" />
  <rect x="370" y="500" width="20" height="20" fill="#FFE082" />

  <!-- The National Arts Theatre (Center Foreground) -->
  <g transform="translate(620, 370)">
    <path d="M -80 180 L 280 180 L 240 150 L -40 150 Z" fill="#FFB300" />
    <path d="M -20 150 Q 100 50 220 150 Z" fill="#FFA000" />
    <path d="M 20 120 Q 100 0 180 120 Z" fill="#FFCA28" />
    <path d="M 100 25 L 100 150" stroke="#FFB300" stroke-width="3" />
    <path d="M 60 55 L 60 150" stroke="#FFB300" stroke-width="3" />
    <path d="M 140 55 L 140 150" stroke="#FFB300" stroke-width="3" />
    <path d="M 25 110 L 25 150" stroke="#FFB300" stroke-width="3" />
    <path d="M 175 110 L 175 150" stroke="#FFB300" stroke-width="3" />
  </g>

  <!-- Foreground Floor / Greenery Base -->
  <path d="M 0 540 L 1440 540 L 1440 600 L 0 600 Z" fill="#4CAF50" opacity="0.2" />

  <!-- Left bushes -->
  <circle cx="80" cy="530" r="60" fill="#4CAF50" />
  <circle cx="150" cy="550" r="70" fill="#388E3C" />
  <circle cx="230" cy="540" r="50" fill="#4CAF50" />

  <!-- Right bushes -->
  <circle cx="1300" cy="520" r="80" fill="#388E3C" />
  <circle cx="1200" cy="560" r="60" fill="#4CAF50" />
  <circle cx="1380" cy="550" r="50" fill="#4CAF50" />

  <!-- Center Bushes framing the Theatre -->
  <circle cx="580" cy="560" r="40" fill="#4CAF50" />
  <circle cx="630" cy="550" r="50" fill="#388E3C" />
  <circle cx="830" cy="550" r="55" fill="#388E3C" />
  <circle cx="890" cy="560" r="40" fill="#4CAF50" />
  
  <!-- Road at the very bottom -->
  <path d="M 0 575 L 1440 575 L 1440 600 L 0 600 Z" fill="#37474F" />
  <path d="M 0 587 L 1440 587" stroke="#CFD8DC" stroke-width="3" stroke-dasharray="30, 40" />
  
  <!-- Animated Vehicles -->
  <g class="danfo">
    <rect x="0" y="545" width="70" height="30" rx="3" fill="#FFC107" />
    <rect x="0" y="558" width="70" height="3" fill="#212121" />
    <rect x="0" y="563" width="70" height="3" fill="#212121" />
    <rect x="5" y="549" width="14" height="8" fill="#E0F7FA" />
    <rect x="22" y="549" width="14" height="8" fill="#E0F7FA" />
    <rect x="39" y="549" width="14" height="8" fill="#E0F7FA" />
    <rect x="56" y="549" width="9" height="8" fill="#E0F7FA" />
    <circle cx="15" cy="575" r="7" fill="#212121" />
    <circle cx="55" cy="575" r="7" fill="#212121" />
  </g>

  <g class="car1">
    <path d="M 0 565 L 10 555 L 30 555 L 45 565 L 50 565 L 50 575 L 0 575 Z" fill="#E53935" />
    <path d="M 12 557 L 20 557 L 20 565 L 5 565 Z" fill="#E0F7FA" />
    <path d="M 22 557 L 28 557 L 40 565 L 22 565 Z" fill="#E0F7FA" />
    <circle cx="12" cy="575" r="6" fill="#212121" />
    <circle cx="38" cy="575" r="6" fill="#212121" />
  </g>
</svg>
